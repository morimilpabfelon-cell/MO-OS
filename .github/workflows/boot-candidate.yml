name: MO OS Boot Candidate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mo-os-boot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-boot:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ISO and virtualization tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            live-build debootstrap xorriso squashfs-tools \
            isolinux syslinux-common syslinux-utils \
            grub-pc-bin grub-efi-amd64-bin mtools dosfstools \
            qemu-system-x86 shellcheck make

      - name: Validate source tree
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e
          make check 2>&1 | tee diagnostics/static-check.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Build MO OS ISO
        run: |
          sudo make clean
          sudo make iso 2>&1 | tee diagnostics/iso-build.log
          sudo chown -R "$USER:$USER" artifacts diagnostics

      - name: Verify ISO metadata and checksum
        run: make verify 2>&1 | tee diagnostics/iso-verify.log

      - name: Boot ISO in QEMU
        env:
          MO_BOOT_TIMEOUT: 300
        run: make boot-test 2>&1 | tee diagnostics/qemu-boot.log

      - name: Publish boot candidate
        uses: actions/upload-artifact@v4
        with:
          name: mo-os-alpha-0.1-amd64
          path: |
            artifacts/mo-os-alpha-0.1-amd64.iso
            artifacts/mo-os-alpha-0.1-amd64.iso.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Publish diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mo-os-boot-diagnostics
          path: diagnostics/
          if-no-files-found: warn
          retention-days: 7
