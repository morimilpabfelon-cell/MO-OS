name: MO OS Boot and UEFI Virtual Installer Candidate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mo-os-system-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-boot-install:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host validation and virtualization tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf shellcheck make

      - name: Validate source tree
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e
          make check 2>&1 | tee diagnostics/static-check.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Build MO OS ISO inside Debian Trixie
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo docker run --rm --privileged \
            --volume "$PWD:/workspace" \
            --workdir /workspace \
            debian:trixie-slim \
            bash -lc '
              set -Eeuo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                live-build debootstrap xorriso squashfs-tools \
                isolinux syslinux-common syslinux-utils \
                grub-pc-bin grub-efi-amd64-bin mtools dosfstools \
                ca-certificates make
              make clean
              make iso
            ' 2>&1 | tee diagnostics/iso-build.log
          sudo chown -R "$USER:$USER" artifacts diagnostics

      - name: Verify ISO metadata and checksum
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get install -y --no-install-recommends xorriso
          make verify 2>&1 | tee diagnostics/iso-verify.log

      - name: Boot live ISO in QEMU
        shell: bash
        env:
          MO_BOOT_TIMEOUT: 300
        run: |
          set -Eeuo pipefail
          make boot-test 2>&1 | tee diagnostics/qemu-live-boot.log

      - name: Install through UEFI and reboot disposable virtual disk
        shell: bash
        env:
          MO_INSTALL_TIMEOUT: 1800
          MO_INSTALLED_BOOT_TIMEOUT: 300
          MO_INSTALL_DIAGNOSTICS_DIR: diagnostics/installer
        run: |
          set -Eeuo pipefail
          make install-test 2>&1 | tee diagnostics/qemu-install-test.log

      - name: Record artifact metadata
        shell: bash
        run: |
          set -Eeuo pipefail
          ls -lh artifacts | tee diagnostics/artifact-info.txt
          sha256sum artifacts/mo-os-alpha-0.3-amd64.iso | tee -a diagnostics/artifact-info.txt

      - name: Publish system candidate
        uses: actions/upload-artifact@v4
        with:
          name: mo-os-alpha-0.3-amd64
          path: |
            artifacts/mo-os-alpha-0.3-amd64.iso
            artifacts/mo-os-alpha-0.3-amd64.iso.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Publish diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mo-os-alpha-0.3-diagnostics
          path: diagnostics/
          if-no-files-found: warn
          retention-days: 7
